apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blood-donor-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Chrisblurp/Blood-Donor-App.git
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
