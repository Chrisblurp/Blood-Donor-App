apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: blooddonoracr78452.azurecr.io/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DEBUG
              value: "False"
            - name: DJANGO_ALLOWED_HOSTS
              value: "localhost,127.0.0.1,sucky-stige.online,api.sucky-stige.online,backend,frontend"
            - name: DATABASE_URL
              value: "postgres://blooduser:bloodpass123@postgres:5432/blooddonor"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://sucky-stige.online"
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30